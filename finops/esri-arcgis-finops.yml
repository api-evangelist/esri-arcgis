specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Esri ArcGIS
providerId: esri-arcgis
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - GIS
  - Location Services
  - Mapping
description: 'FOCUS-aligned FinOps for Esri ArcGIS: a hybrid surface combining (a) ArcGIS Location Platform
  pay-as-you-go transaction pricing per service (tiles, geocoding, routing, etc.) with monthly free tiers,
  and (b) ArcGIS Online named-user subscriptions plus credit-based consumption for storage and analysis.'
sources:
  - https://location.arcgis.com/pricing/
  - https://www.esri.com/en-us/arcgis/products/arcgis-online/pricing/credits
  - https://www.esri.com/en-us/arcgis/products/arcgis-online/buy
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Environmental Systems Research Institute, Inc. (Esri)
serviceCategory: GIS / Location Services
billingModel:
  pricingCategory: Pay-As-You-Go + Subscription + Credits
  billingFrequency: Monthly (Location Platform); Annual (ArcGIS Online)
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Esri ArcGIS
  ServiceCategory: GIS / Location Services
  ProviderName: Esri
  PublisherName: Environmental Systems Research Institute, Inc.
  InvoiceIssuerName: Environmental Systems Research Institute, Inc.
  BillingCurrency: USD
meters:
  - name: basemap_tile_requests
    unit: tile
    aggregation: sum
    dimensions:
      - api_key
      - style
  - name: geocode_requests
    unit: geocode
    aggregation: sum
    dimensions:
      - api_key
      - operation
  - name: routing_requests
    unit: route
    aggregation: sum
    dimensions:
      - api_key
      - mode
  - name: places_requests
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - operation
  - name: enrichment_attributes
    unit: attribute
    aggregation: sum
    dimensions:
      - api_key
      - dataset
  - name: spatial_analysis_features
    unit: feature
    aggregation: sum
    dimensions:
      - api_key
      - operation
  - name: feature_storage
    unit: MB-month
    aggregation: max
    dimensions:
      - org
  - name: tile_storage
    unit: MB-month
    aggregation: max
    dimensions:
      - org
  - name: tile_bandwidth
    unit: GB
    aggregation: sum
    dimensions:
      - org
  - name: arcgis_online_credits
    unit: credit
    aggregation: sum
    dimensions:
      - org
      - user_type
      - service
  - name: arcgis_online_user_seats
    unit: seat
    aggregation: max
    dimensions:
      - user_type
principles:
  - name: Visibility
    description: Use the ArcGIS Location Platform usage dashboard, ArcGIS Online credits dashboard, and
      org-level reports to monitor monthly consumption against free-tier ceilings.
  - name: Allocation
    description: Issue one API key per application or environment; assign ArcGIS Online users to groups
      mapped to cost centers to allocate seat and credit spend.
  - name: Optimization
    description: Cache geocoding results where licensing allows; pre-bake tile sets that exceed 2M/month
      free; tune routing precision; right-size user-type assignments (Viewer vs Creator) to avoid over-licensing;
      buy credit blocks before recurring overage.
  - name: Accountability
    description: GIS lead owns ArcGIS Online org subscription; engineering owns Location Platform API
      keys; finance reviews monthly variance against credit and PAYG forecasts.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
