      - method: GET
        name: getitem
        description: Get portal item
        call: esri-arcgis.getitem
        with:
          itemId: rest.itemId
        outputParameters:
        - type: object
          mapping: $.
    - path: /search
      name: searchportal
      operations:
      - method: GET
        name: searchportal
        description: Search portal content
        call: esri-arcgis.searchportal
        outputParameters:
        - type: object
          mapping: $.
    - path: /findAddressCandidates
      name: findaddresscandidates
      operations:
      - method: GET
        name: findaddresscandidates
        description: Geocode an address
        call: esri-arcgis.findaddresscandidates
        outputParameters:
        - type: object
          mapping: $.
    - path: /reverseGeocode
      name: reversegeocode
      operations:
      - method: GET
        name: reversegeocode
        description: Reverse geocode coordinates
        call: esri-arcgis.reversegeocode
        outputParameters:
        - type: object
          mapping: $.
    - path: /places/near-point
      name: findplacesnearpoint
      operations:
      - method: GET
        name: findplacesnearpoint
        description: Find places near a point
        call: esri-arcgis.findplacesnearpoint
        outputParameters:
        - type: object
          mapping: $.
    - path: /places/{placeId}
      name: getplacedetails
      operations:
      - method: GET
        name: getplacedetails
        description: Get place details
        call: esri-arcgis.getplacedetails
        with:
          placeId: rest.placeId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: esri-arcgis-mcp
    transport: http
    description: MCP adapter for ESRI ArcGIS Platform API for AI agent use.
