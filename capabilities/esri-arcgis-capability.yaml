naftiko: 1.0.0-alpha2
info:
  label: ESRI ArcGIS Platform API
  description: ESRI ArcGIS Platform REST API for sharing, managing, and accessing GIS content including feature services,
    maps, layers, users, and portal items. The API enables geospatial data management, spatial analysis, geocoding, routing,
    and organizational administration for ArcGIS Online and ArcGIS Enterprise deployments.
  tags:
  - Esri
  - Arcgis
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: esri-arcgis
    baseUri: https://www.arcgis.com/sharing/rest
    description: ESRI ArcGIS Platform API HTTP API.
    authentication:
      type: apikey
      in: query
      name: token
      value: '{{ESRI_ARCGIS_TOKEN}}'
    resources:
    - name: portals-self
      path: /portals/self
      operations:
      - name: getportalself
        method: GET
        description: Get portal information
        inputParameters:
        - name: f
          in: query
          type: string
          description: Output format
        - name: token
          in: query
          type: string
          description: Authentication token (alternative to Authorization header)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: community-users-username
      path: /community/users/{username}
      operations:
      - name: getuser
        method: GET
        description: Get user profile
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
          description: Username of the ArcGIS Online user
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-users-username-items
      path: /content/users/{username}/items
      operations:
      - name: getuseritems
        method: GET
        description: List user content items
        inputParameters:
        - name: username
          in: path
          type: string
          required: true
        - name: num
          in: query
          type: integer
          description: Number of results to return
        - name: start
          in: query
          type: integer
          description: Index of the first entry in the result set (1-based)
        - name: sortField
          in: query
          type: string
        - name: sortOrder
          in: query
          type: string
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-items-itemid
      path: /content/items/{itemId}
      operations:
      - name: getitem
        method: GET
        description: Get portal item
        inputParameters:
        - name: itemId
          in: path
          type: string
          required: true
          description: Unique identifier of the portal item
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      operations:
      - name: searchportal
        method: GET
        description: Search portal content
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Query string using ArcGIS search syntax (e.g., "type:Feature Service owner:jsmith")
        - name: num
          in: query
          type: integer
        - name: start
          in: query
          type: integer
        - name: sortField
          in: query
          type: string
        - name: sortOrder
          in: query
          type: string
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: findaddresscandidates
      path: /findAddressCandidates
      operations:
      - name: findaddresscandidates
        method: GET
        description: Geocode an address
        inputParameters:
        - name: SingleLine
          in: query
          type: string
          description: Single-line address string (e.g., "380 New York St, Redlands, CA 92373")
        - name: Address
          in: query
          type: string
          description: Street address component
        - name: City
          in: query
          type: string
        - name: Region
          in: query
          type: string
          description: State or province
        - name: Postal
          in: query
          type: string
        - name: CountryCode
          in: query
          type: string
          description: ISO 3166-1 alpha-2 or alpha-3 country code
        - name: maxLocations
          in: query
          type: integer
        - name: outFields
          in: query
          type: string
          description: Comma-separated list of output fields (* for all)
        - name: outSR
          in: query
          type: integer
          description: Output spatial reference WKID
        - name: token
          in: query
          type: string
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reversegeocode
      path: /reverseGeocode
      operations:
      - name: reversegeocode
        method: GET
        description: Reverse geocode coordinates
        inputParameters:
        - name: location
          in: query
          type: string
          required: true
          description: Point location as JSON (e.g., {"x":-117.2,"y":34.06,"spatialReference":{"wkid":4326}})
        - name: distance
          in: query
          type: number
          description: Distance in meters to search from the input location
        - name: outSR
          in: query
          type: integer
        - name: token
          in: query
          type: string
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: places-near-point
      path: /places/near-point
      operations:
      - name: findplacesnearpoint
        method: GET
        description: Find places near a point
        inputParameters:
        - name: x
          in: query
          type: number
          required: true
          description: Longitude of the center point (WGS84)
        - name: y
          in: query
          type: number
          required: true
          description: Latitude of the center point (WGS84)
        - name: radius
          in: query
          type: number
          description: Search radius in meters (max 10000)
        - name: categoryIds
          in: query
          type: string
          description: Comma-separated category IDs to filter results
        - name: pageSize
          in: query
          type: integer
        - name: token
          in: query
          type: string
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: places-placeid
      path: /places/{placeId}
      operations:
      - name: getplacedetails
        method: GET
        description: Get place details
        inputParameters:
        - name: placeId
          in: path
          type: string
          required: true
          description: Unique identifier for the place
        - name: requestedFields
          in: query
          type: string
          description: Comma-separated list of attribute fields to return
        - name: token
          in: query
          type: string
        - name: f
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: esri-arcgis-rest
    description: REST adapter for ESRI ArcGIS Platform API.
    resources:
    - path: /portals/self
      name: getportalself
      operations:
      - method: GET
        name: getportalself
        description: Get portal information
        call: esri-arcgis.getportalself
        outputParameters:
        - type: object
          mapping: $.
    - path: /community/users/{username}
      name: getuser
      operations:
      - method: GET
        name: getuser
        description: Get user profile
        call: esri-arcgis.getuser
        with:
          username: rest.username
        outputParameters:
        - type: object
          mapping: $.
    - path: /content/users/{username}/items
      name: getuseritems
