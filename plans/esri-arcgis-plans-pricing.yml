        type: metered
        metric: feature
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '0.10'
        userMultiplied: false
      - label: Feature data storage
        name: feature_storage
        type: quota
        metric: MB
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Feature query/edit bandwidth
        name: feature_bandwidth
        type: quota
        metric: MB
        limit: 125
