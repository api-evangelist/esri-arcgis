        geo: global
        unit: 1000
        price: '0.05'
        userMultiplied: false
      - label: Stop-optimized routes
        name: routes_optimized
        type: metered
        metric: route
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '50.00'
        userMultiplied: false
      - label: Fleet routes
        name: routes_fleet
        type: metered
        metric: route
        limit: -1
        timeFrame: usage
        geo: global
