specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Esri ArcGIS
providerId: esri-arcgis
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - GIS
  - Location Services
  - Geocoding
  - Routing
  - Mapping
description: 'Esri ArcGIS prices on two distinct surfaces: (1) ArcGIS Location Platform — a developer-oriented
  pay-as-you-go service for location APIs (basemaps, geocoding, routing, places, enrichment) with a generous
  monthly free tier and per-1,000-transaction pricing; and (2) ArcGIS Online — a per-named-user subscription
  with credit-based consumption for geocoding/routing/storage/analysis. Additional credits for ArcGIS
  Online sell in 1,000-credit blocks valid 24 months. Volume and enterprise terms are negotiated with
  Esri sales.'
sources:
  - https://location.arcgis.com/pricing/
  - https://www.esri.com/en-us/arcgis/products/arcgis-online/buy
  - https://www.esri.com/en-us/arcgis/products/arcgis-online/pricing/credits
plans:
  - id: esri-arcgis-location-platform-payg
    name: ArcGIS Location Platform — Pay-As-You-Go
    type: usage-based
    description: Developer-friendly per-transaction pricing with monthly free tiers across location services.
    entries:
      - label: Basemap tiles (after 2M free/mo)
        name: basemap_tiles
        type: metered
        metric: tile
        limit: 2000000
        timeFrame: month
        geo: global
        unit: 1000
        price: '0.15'
        userMultiplied: false
      - label: Geocoding (after 20K free/mo)
        name: geocodes
        type: metered
        metric: geocode
        limit: 20000
        timeFrame: month
        geo: global
        unit: 1000
        price: '0.50'
        userMultiplied: false
      - label: Routing — basic (after 20K free/mo)
        name: routes_basic
        type: metered
        metric: route
        limit: 20000
        timeFrame: month
        geo: global
        unit: 1000
        price: '0.50'
        userMultiplied: false
      - label: Elevation (after 50K free/mo)
